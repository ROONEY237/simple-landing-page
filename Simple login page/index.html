<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
  <div class="main">
    <p>Login to CodeAcademy</p>
    <h3>Email or Username</h3>
    <input type="text" placeholder="">
    <h3>Password</h3>
    <input type="password" placeholder="">
    <a href="#">I forgot my password</a>
    <button>Log in</button>
    <h3>Log in with Another Account</h3>

    <div class="social">
        <div>
          <i class="fa-brands fa-linkedin" style="color: rgb(70, 60, 246);"></i>
        </div>

        <div>
          <i class="fa-brands fa-google"></i>
        </div>

        <div>
          <i class="fa-brands fa-square-facebook" style="color: rgb(74, 123, 239);"></i>
        </div>

        <div>
          <i class="fa-brands fa-github"></i>
        </div>
        <div>
          <i class="fa-brands fa-twitter" style="color: rgb(116, 192, 252);"></i>
        </div>
    </div>

    <div class="signup">
      <a href="#">Not a member yet? <span>Sign up free</span> </a>
    </div>
    

  </div>
</body>
</html>
